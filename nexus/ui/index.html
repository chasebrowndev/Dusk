<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dusk</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Theme ──────────────────────────────────────────────────────────────── */
:root {
  --bg0: #080b0f; --bg1: #0d1117; --bg2: #131923; --bg3: #1a2233;
  --border: #1f2d40; --border-hi: #2a3f5a;
  --fg0: #cdd9e5; --fg1: #8da4be; --fg2: #546e8a;
  --accent: #3b9ae8; --accent2: #1f6fb5;
  --green: #3fb950; --red: #f85149; --amber: #e3b341; --purple: #bc8cff;
  --font-mono: 'JetBrains Mono','Fira Code','NerdIcons',monospace;
  --font-ui: 'IBM Plex Sans','Inter','NerdIcons',system-ui,sans-serif;
  --radius: 3px; --sidebar: 200px;
}
[data-theme="ashen"] {
  --bg0: #0e0b0a; --bg1: #161210; --bg2: #1e1714; --bg3: #281e19;
  --border: #3a2418; --border-hi: #522e1c;
  --fg0: #d8c8bc; --fg1: #a08070; --fg2: #6a5040;
  --accent: #e8681a; --accent2: #c04c08;
  --green: #7abf6a; --red: #d04040; --amber: #e8a030; --purple: #b87aaa;
}
[data-theme="whimsy"] {
  --bg0: #fff0f5; --bg1: #ffffff; --bg2: #ffe0ee; --bg3: #ffc8e0;
  --border: #ffb0d4; --border-hi: #ff80b8;
  --fg0: #3a0820; --fg1: #801840; --fg2: #c04878;
  --accent: #ff2d78; --accent2: #d4005a;
  --green: #20b060; --red: #e0103a; --amber: #e07010; --purple: #8040c0;
}
[data-theme="void"] {
  --bg0: #000000; --bg1: #080808; --bg2: #101010; --bg3: #181818;
  --border: #222222; --border-hi: #333333;
  --fg0: #e0e0e0; --fg1: #909090; --fg2: #505050;
  --accent: #c0c0c0; --accent2: #808080;
  --green: #50c050; --red: #c05050; --amber: #c0a050; --purple: #a080c0;
}
.theme-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; }
.theme-swatch { padding: 7px 6px; border-radius: var(--radius); border: 2px solid transparent;
                font-family: var(--font-mono); font-size: 11px; cursor: pointer;
                text-align: center; transition: border-color 0.15s; user-select: none; }
.theme-swatch.active { border-color: var(--accent); }

@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
@font-face {
  font-family: 'NerdIcons';
  src: local('Symbols Nerd Font'), local('NerdFontsSymbolsNerdFont-Regular'),
       url('/usr/share/fonts/TTF/SymbolsNerdFont-Regular.ttf') format('truetype'),
       url('/usr/share/fonts/OTF/SymbolsNerdFont-Regular.otf') format('opentype'),
       url('/usr/share/fonts/nerd-fonts-symbols/SymbolsNerdFont-Regular.ttf') format('truetype');
  font-display: swap;
}

html, body {
  height: 100%; background: var(--bg0); color: var(--fg0);
  font-family: var(--font-ui); font-size: 13px; line-height: 1.5;
  overflow: hidden; -webkit-font-smoothing: antialiased;
}
#app {
  display: grid;
  grid-template-columns: var(--sidebar) 1fr;
  grid-template-rows: 36px 1fr 28px;
  height: 100vh; width: 100vw;
}

/* ── Titlebar ── */
#titlebar {
  grid-column: 1/-1; background: var(--bg1); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 12px; gap: 10px; user-select: none;
}
.logo { font-family: var(--font-mono); font-weight: 500; font-size: 12px;
        letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; }
.sep { flex: 1; }
#status-badge { display: flex; align-items: center; gap: 6px;
                font-size: 11px; color: var(--fg2); font-family: var(--font-mono); }
#status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--fg2); transition: background 0.3s; }
#status-dot.hosting   { background: var(--green);  box-shadow: 0 0 6px var(--green); }
#status-dot.connected { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
#status-dot.connecting, #status-dot.reconnecting { background: var(--amber); animation: pulse 0.8s infinite; }
#status-dot.error { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.titlebar-btn { background: none; border: none; color: var(--fg2); cursor: pointer;
                font-size: 14px; padding: 4px 6px; border-radius: var(--radius);
                line-height: 1; transition: color 0.15s, background 0.15s; }
.titlebar-btn:hover { color: var(--fg0); background: var(--bg2); }

/* ── Sidebar ── */
#sidebar { background: var(--bg1); border-right: 1px solid var(--border);
           display: flex; flex-direction: column; overflow: hidden; }
.sidebar-section { border-bottom: 1px solid var(--border); padding: 8px 0; }
.sidebar-label { padding: 4px 12px; font-size: 10px; font-weight: 600;
                 letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg2); }

/* ── Buttons ── */
.btn { display: flex; align-items: center; justify-content: center; gap: 5px;
       padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius);
       background: var(--bg2); color: var(--fg0); font-family: var(--font-mono);
       font-size: 11px; cursor: pointer; transition: background 0.12s, border-color 0.12s;
       white-space: nowrap; user-select: none; width: 100%; }
.btn:hover  { background: var(--bg3); border-color: var(--border-hi); }
.btn:active { background: var(--bg0); }
.btn.danger { border-color: var(--red);   color: var(--red); }
.btn.danger:hover { background: color-mix(in srgb, var(--red) 10%, var(--bg0)); }
.btn.green  { border-color: var(--green); color: var(--green); }
.btn.green:hover  { background: color-mix(in srgb, var(--green) 10%, var(--bg0)); }
.btn.active { background: var(--accent2); border-color: var(--accent); color: #fff; }

/* ── Voice ── */
#call-panel { padding: 8px 10px; display: flex; flex-direction: column; gap: 6px; }
#call-extra-btns { display: none; gap: 5px; }
#call-extra-btns.visible { display: flex; }
#call-extra-btns .btn { flex: 1; }
#mic-meter { display: none; height: 3px; background: var(--bg0);
             border-radius: 2px; border: 1px solid var(--border); overflow: hidden; }
#mic-meter.active { display: block; }
#mic-bar { height: 100%; width: 0%; background: var(--green);
           transition: width 0.05s linear; border-radius: 2px; }

/* ── Media ── */
#media-btns { padding: 6px 10px; display: flex; flex-direction: column; gap: 5px; }

/* ── Admin ── */
#admin-section { display: none; }
#admin-section.visible { display: block; }
.admin-row { display: flex; align-items: center; gap: 8px; padding: 6px 10px;
             border-radius: var(--radius); background: var(--bg2); border: 1px solid var(--border); }
.admin-peer-name { flex: 1; font-size: 12px; font-family: var(--font-mono); color: var(--fg0); }
.admin-btns { display: flex; gap: 5px; }
.admin-btns .btn { width: auto; padding: 4px 9px; font-size: 10px; }
#event-log-section { display: none; }
#event-log-section.visible { display: block; border-top: 1px solid var(--border); }
#event-log { max-height: 90px; overflow-y: auto; padding: 4px 10px;
             display: flex; flex-direction: column; gap: 1px; }
#event-log::-webkit-scrollbar { width: 3px; }
#event-log::-webkit-scrollbar-thumb { background: var(--border); }
.evt-line { font-family: var(--font-mono); font-size: 10px; color: var(--fg2);
            line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.evt-line.warn    { color: var(--amber); }
.evt-line.error   { color: var(--red); }
.evt-line.info    { color: var(--accent); }
.evt-line.success { color: var(--green); }

/* ── Messages ── */
#messages { flex: 1; overflow-y: auto; padding: 12px 0; min-height: 0;
            display: flex; flex-direction: column; gap: 1px; scroll-behavior: smooth; }
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.msg-row { display: flex; align-items: flex-start; padding: 4px 14px; gap: 8px;
           animation: msg-in 0.15s ease-out; }
@keyframes msg-in { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
.msg-row:hover { background: var(--bg1); }
.msg-ts { font-family: var(--font-mono); font-size: 10px; color: var(--fg2);
          min-width: 38px; flex-shrink: 0; user-select: none;
          text-align: right; order: 99; opacity: 0; transition: opacity 0.1s;
          padding-top: 2px; }
.msg-row:hover .msg-ts { opacity: 1; }
.msg-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
.msg-sender { font-weight: 600; font-size: 12px; color: var(--accent); display: block;
              line-height: 1.4; }
.msg-sender.self { color: var(--purple); }
.msg-text { font-size: 13px; color: var(--fg0); word-break: break-word; line-height: 1.5;
            display: block; white-space: pre-wrap; }
.msg-img { max-width: 280px; max-height: 200px; border-radius: var(--radius);
           border: 1px solid var(--border); margin-top: 4px; display: block;
           cursor: pointer; }
.msg-row.system .msg-text { color: var(--fg2); font-size: 11px; font-style: italic;
                             font-family: var(--font-mono); }
.msg-row.system .msg-sender { display: none; }
.msg-row.system .msg-ts { display: none; }

/* ── Typing indicator ── */
#typing-indicator { padding: 0 14px 4px; font-size: 11px; font-style: italic;
                    color: var(--fg2); font-family: var(--font-mono); min-height: 18px; }

/* ── File transfer ── */
.file-msg { display: flex; align-items: center; gap: 10px;
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 8px 12px; margin-top: 4px;
            max-width: 320px; }
.file-icon { font-size: 20px; flex-shrink: 0; }
.file-info { flex: 1; min-width: 0; }
.file-name { font-weight: 600; font-size: 12px; font-family: var(--font-mono);
             color: var(--fg0); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-size { font-size: 10px; color: var(--fg2); font-family: var(--font-mono); }
.file-progress { height: 3px; background: var(--border); border-radius: 2px;
                 margin-top: 4px; overflow: hidden; }
.file-progress-bar { height: 100%; background: var(--accent); border-radius: 2px;
                     transition: width 0.1s; }
.file-save-btn { font-size: 10px; padding: 4px 10px; width: auto; flex-shrink: 0; }

/* ── Input ── */
#input-bar { padding: 8px 12px; background: var(--bg1); border-top: 1px solid var(--border);
             display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; min-height: 50px; }
#msg-input { flex: 1; background: var(--bg0); border: 1px solid var(--border);
             color: var(--fg0); font-family: var(--font-ui); font-size: 13px;
             padding: 7px 10px; border-radius: var(--radius); outline: none;
             resize: none; height: 34px; max-height: 120px; line-height: 1.5;
             transition: border-color 0.15s; overflow-y: hidden; }
#msg-input:focus { border-color: var(--accent); }
#msg-input::placeholder { color: var(--fg2); }
.input-btn { width: 34px; height: 34px; padding: 0; flex-shrink: 0; font-size: 14px;
             align-self: flex-end; }
#send-btn { background: var(--accent2); border-color: var(--accent); color: #fff; }
#send-btn:hover { background: var(--accent); }
#file-btn { background: var(--bg2); color: var(--fg1); }

/* ── Scratchpad ── */

/* ── Statusbar ── */
#statusbar { grid-column: 1/-1; background: var(--bg1); border-top: 1px solid var(--border);
             display: flex; align-items: center; padding: 0 12px; gap: 16px;
             font-family: var(--font-mono); font-size: 10px; color: var(--fg2); }
.sb-item { display: flex; gap: 5px; align-items: center; }
.sb-val  { color: var(--fg1); }
#sb-rtt  { display: none; }
#sb-rtt.visible { display: flex; }

/* ── Toast ── */
#toast-area { position: fixed; bottom: 40px; right: 12px;
              display: flex; flex-direction: column; gap: 6px; z-index: 100; pointer-events: none; }
.toast { background: var(--bg3); border: 1px solid var(--border-hi); color: var(--fg0);
         font-size: 11px; font-family: var(--font-mono); padding: 7px 12px;
         border-radius: var(--radius);
         animation: toast-in 0.2s ease-out, toast-out 0.3s ease-in 2.7s forwards; max-width: 260px; }
.toast.error   { border-color: var(--red);   color: var(--red); }
.toast.success { border-color: var(--green);  color: var(--green); }
.toast.info    { border-color: var(--accent); color: var(--accent); }
@keyframes toast-in  { from{opacity:0;transform:translateX(10px)} to{opacity:1;transform:translateX(0)} }
@keyframes toast-out { to{opacity:0;transform:translateX(10px)} }

/* ── Modal ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
                 z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.visible { display: flex; }
.modal-box { background: var(--bg1); border: 1px solid var(--border-hi); border-radius: 4px;
             padding: 20px; width: 500px; max-width: 95vw; max-height: 90vh;
             overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
.modal-box h2 { font-size: 13px; font-weight: 600; color: var(--fg0);
                font-family: var(--font-mono); border-bottom: 1px solid var(--border);
                padding-bottom: 10px; }
.modal-controls { display: flex; gap: 8px; justify-content: flex-end; }
.modal-controls .btn { width: auto; padding: 6px 14px; }
.setting-row { display: flex; flex-direction: column; gap: 5px; }
.setting-row label { font-size: 11px; font-weight: 600; color: var(--fg2);
                     text-transform: uppercase; letter-spacing: 0.08em; font-family: var(--font-mono); }
.setting-row input[type="text"], .setting-row input[type="color"] {
  background: var(--bg0); border: 1px solid var(--border); color: var(--fg0);
  font-family: var(--font-mono); font-size: 12px; padding: 6px 8px;
  border-radius: var(--radius); outline: none; transition: border-color 0.15s;
}
.setting-row input:focus { border-color: var(--accent); }

/* ── Custom dropdown ── */
.dusk-select { position: relative; width: 100%; user-select: none; }
.dusk-select-val {
  background: var(--bg0); border: 1px solid var(--border); color: var(--fg0);
  font-family: var(--font-mono); font-size: 12px; padding: 6px 26px 6px 8px;
  border-radius: var(--radius); cursor: pointer; transition: border-color 0.15s;
  position: relative; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.dusk-select-val::after {
  content: ""; position: absolute; right: 9px; top: 50%;
  transform: translateY(-50%);
  border: 4px solid transparent; border-top: 5px solid var(--fg2); margin-top: 2px;
  transition: border-color 0.15s;
}
.dusk-select.open .dusk-select-val { border-color: var(--accent); }
.dusk-select.open .dusk-select-val::after {
  border-top-color: transparent; border-bottom: 5px solid var(--accent); margin-top: -4px;
}
.dusk-select-list {
  display: none; position: absolute; top: calc(100% + 3px); left: 0; right: 0; z-index: 9999;
  background: var(--bg1); border: 1px solid var(--border-hi); border-radius: var(--radius);
  max-height: 180px; overflow-y: auto; box-shadow: 0 6px 20px rgba(0,0,0,0.5);
}
.dusk-select.open .dusk-select-list { display: block; }
.dusk-select-opt {
  padding: 7px 10px; font-family: var(--font-mono); font-size: 12px;
  color: var(--fg0); cursor: pointer; transition: background 0.1s;
}
.dusk-select-opt:hover { background: var(--bg2); }
.dusk-select-opt.selected { color: var(--accent); }

/* ── PiP ── */
#pip-overlay { position: fixed; z-index: 500; bottom: 40px; right: 12px;
               width: 280px; height: 195px; min-width: 180px; min-height: 130px;
               border-radius: 4px; overflow: hidden;
               border: 1px solid var(--border-hi);
               box-shadow: 0 4px 20px rgba(0,0,0,0.5); background: #000;
               user-select: none; resize: both;
               display: none; flex-direction: column; }
#pip-overlay.visible { display: flex; }
#pip-video { flex: 1; width: 100%; display: block; object-fit: cover; background: #000; min-height: 0; }
#pip-bar { display: flex; align-items: center; padding: 4px 8px; gap: 6px;
           background: var(--bg1); border-top: 1px solid var(--border);
           font-size: 10px; font-family: var(--font-mono); color: var(--fg2);
           flex-shrink: 0; cursor: move; }
#pip-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#pip-close { background: none; border: none; color: var(--fg2); cursor: pointer;
             font-size: 12px; padding: 0 2px; line-height: 1; }
#pip-close:hover { color: var(--red); }
/* Visible resize grip in bottom-right corner */
#pip-overlay::after {
  content: ""; position: absolute; bottom: 18px; right: 0;
  width: 14px; height: 14px; cursor: se-resize;
  background: linear-gradient(135deg, transparent 50%, var(--border-hi) 50%,
              var(--border-hi) 60%, transparent 60%,
              transparent 70%, var(--border-hi) 70%,
              var(--border-hi) 80%, transparent 80%);
  opacity: 0.6; pointer-events: none;
}
#stream-indicator { position: fixed; z-index: 400; top: 44px; left: 50%; transform: translateX(-50%);
                    background: var(--bg2); border: 1px solid var(--border-hi);
                    border-radius: var(--radius); padding: 4px 12px;
                    font-size: 11px; font-family: var(--font-mono); color: var(--fg1);
                    display: none; align-items: center; gap: 8px; }
#stream-indicator.visible { display: flex; }
#stream-stop-btn { background: none; border: 1px solid var(--red); color: var(--red);
                   border-radius: var(--radius); font-size: 10px; font-family: var(--font-mono);
                   padding: 2px 8px; cursor: pointer; }

/* ── In-call banner ── */
#main { display: flex; flex-direction: column; overflow: hidden; min-height: 0; height: 100%; }
#channel-header { background: var(--bg1); border-bottom: 1px solid var(--border);
                  display: flex; align-items: center; padding: 0 14px; gap: 10px;
                  flex-shrink: 0; }
#channel-header:not(:has(#in-call-banner.visible)) { display: none; }
#in-call-banner { display: none; align-items: center; gap: 6px;
                  font-size: 11px; color: var(--green); font-family: var(--font-mono); padding: 6px 0; }
#in-call-banner.visible { display: flex; }
.call-dot { width: 7px; height: 7px; background: var(--green);
            border-radius: 50%; animation: pulse 1.2s infinite; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div id="app">

<!-- Titlebar -->
<div id="titlebar">
  <span class="logo">⬡ Dusk</span>
  <span class="sep"></span>
  <div id="status-badge">
    <div id="status-dot"></div>
    <span id="status-text">connecting…</span>
  </div>
  <button class="titlebar-btn" onclick="ui.openSettings()" title="Settings">⚙</button>
</div>

<!-- Sidebar -->
<div id="sidebar">
  <div class="sidebar-section">
    <div class="sidebar-label">voice</div>
    <div id="call-panel">
      <div id="voice-status-row" style="display:flex;align-items:center;gap:7px;padding:4px 2px;font-size:11px;font-family:var(--font-mono);color:var(--fg2);">
        <div id="voice-dot" style="width:6px;height:6px;border-radius:50%;background:var(--fg2);flex-shrink:0;"></div>
        <span id="voice-status-text">waiting for peer…</span>
      </div>
      <div id="call-extra-btns">
        <button class="btn" id="mute-btn" onclick="actions.toggleMute()">🎙 Mic</button>
        <button class="btn" id="deaf-btn" onclick="actions.toggleDeaf()">🎧 Audio</button>
      </div>
      <div id="mic-meter"><div id="mic-bar"></div></div>
    </div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">media</div>
    <div id="media-btns">
      <button class="btn" onclick="actions.openCamera()">📷 Camera</button>
      <button class="btn" onclick="actions.shareScreen()">🖥 Screen</button>
      <button class="btn danger" id="stream-stop-sidebar" style="display:none" onclick="actions.stopStream()">■ Stop</button>
    </div>
  </div>
  <div class="sidebar-section" id="admin-section">
    <div class="sidebar-label">admin</div>
    <div id="admin-panel" style="padding:6px 10px;display:flex;flex-direction:column;gap:5px;">
      <div id="admin-no-peers" style="font-size:11px;color:var(--fg2);font-style:italic;padding:2px 2px">no peer</div>
    </div>
  </div>
  <div id="event-log-section">
    <div class="sidebar-label" style="padding:4px 12px 2px">events</div>
    <div id="event-log"></div>
  </div>
</div>

<!-- Main -->
<div id="main">
  <div id="channel-header">
    <div id="in-call-banner"><div class="call-dot"></div> in call</div>
  </div>

  <!-- Chat pane -->
  <div id="pane-chat" style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;">
    <div id="messages"></div>
    <div id="typing-indicator"></div>
    <div id="input-bar">
      <textarea id="msg-input" placeholder="Message… (paste image with Ctrl+V)" rows="1"
        onkeydown="actions.inputKeydown(event)"
        onpaste="actions.handlePaste(event)"
        oninput="actions.onTyping()"></textarea>
      <label class="btn input-btn file-btn" title="Send file" style="cursor:pointer;width:34px;height:34px;padding:0;font-size:16px;">
        📎<input type="file" id="file-input" style="display:none" onchange="actions.sendFile(event)">
      </label>
      <button class="btn input-btn" id="send-btn" onclick="actions.send()">↑</button>
    </div>
  </div>
</div>

<!-- Statusbar -->
<div id="statusbar">
  <div class="sb-item">state <span class="sb-val" id="sb-state">—</span></div>
  <div class="sb-item">peer  <span class="sb-val" id="sb-peers">—</span></div>
  <div class="sb-item">port  <span class="sb-val" id="sb-port">—</span></div>
  <div class="sb-item" id="sb-rtt">ping <span class="sb-val" id="sb-rtt-val">—</span> ms</div>
</div>

</div>

<div id="toast-area"></div>

<!-- Settings modal -->
<div id="settings-modal" class="modal-overlay">
  <div class="modal-box">
    <h2>⚙ Settings</h2>
    <div class="setting-row">
      <label>Display name</label>
      <input type="text" id="setting-name" placeholder="Your name" />
    </div>
    <div class="setting-row">
      <label>Microphone</label>
      <div class="dusk-select" id="dusk-mic-select" data-value="">
        <div class="dusk-select-val" onclick="duskSelectToggle('dusk-mic-select')">Default</div>
        <div class="dusk-select-list" id="dusk-mic-list"></div>
      </div>
    </div>
    <div class="setting-row">
      <label>Camera</label>
      <div class="dusk-select" id="dusk-cam-select" data-value="">
        <div class="dusk-select-val" onclick="duskSelectToggle('dusk-cam-select')">Default</div>
        <div class="dusk-select-list" id="dusk-cam-list"></div>
      </div>
    </div>
    <div class="setting-row">
      <label>Theme</label>
      <div class="theme-grid" id="theme-grid"></div>
    </div>
    <div class="setting-row">
      <label>History</label>
      <button class="btn danger" onclick="ui.clearHistory()" style="width:auto;padding:5px 12px;font-size:10px;">Clear message history</button>
    </div>
    <div class="modal-controls">
      <button class="btn danger" onclick="ui.closeSettings()">Cancel</button>
      <button class="btn green" onclick="ui.saveSettings()">Save</button>
    </div>
  </div>
</div>

<!-- PiP overlay -->
<div id="pip-overlay">
  <video id="pip-video" autoplay muted playsinline></video>
  <div id="pip-bar">
    <span id="pip-label">peer stream</span>
    <button id="pip-close" onclick="pipClose()">✕</button>
  </div>
</div>
<div id="stream-indicator">
  <span id="stream-label">streaming</span>
  <button id="stream-stop-btn" onclick="actions.stopStream()">Stop</button>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const state = {
  peers:     {},
  peerMuted: {},
  inCall:    false,
  muted:     false,
  deafened:  false,
  isHost:    false,
  theme:     localStorage.getItem("dusk-theme") || "default",
};

// ── Themes ────────────────────────────────────────────────────────────────────
const THEMES = [
  { id: "default", label: "Dusk",   bg: "#080b0f", fg: "#3b9ae8" },
  { id: "ashen",   label: "Ashen",  bg: "#0e0b0a", fg: "#e8681a" },
  { id: "whimsy",  label: "Whimsy", bg: "#fff0f5", fg: "#ff2d78" },
  { id: "void",    label: "Void",   bg: "#000000", fg: "#c0c0c0" },
];

function applyTheme(id) {
  state.theme = id;
  document.documentElement.setAttribute("data-theme", id === "default" ? "" : id);
  localStorage.setItem("dusk-theme", id);
  document.querySelectorAll(".theme-swatch").forEach(el =>
    el.classList.toggle("active", el.dataset.theme === id));
}

function buildThemeGrid() {
  const grid = document.getElementById("theme-grid");
  grid.innerHTML = THEMES.map(t => `
    <div class="theme-swatch" data-theme="${t.id}"
         style="background:${t.bg};color:${t.fg};border-color:${t.bg}"
         onclick="applyTheme('${t.id}')">${t.label}</div>
  `).join("");
  applyTheme(state.theme); // re-mark active
}

// ── Event bus ─────────────────────────────────────────────────────────────────
window.nexus = {
  onEvent(evt) {
    console.log("[nexus event]", evt.type, evt);
    try {
      switch (evt.type) {
        case "status":               handleStatus(evt);       break;
        case "message":              handleMessage(evt);      break;
        case "message_image":        handleImageMessage(evt); break;
        case "history_sync":         handleHistorySync(evt);   break;
        case "peer_join":            handlePeerJoin(evt);     break;
        case "peer_leave":           handlePeerLeave(evt);    break;
        case "call_start":           handleCallStart(evt);    break;
        case "call_end":             handleCallEnd(evt);      break;
        case "mic_level":            handleMicLevel(evt);     break;
        case "admin_cmd":            handleAdminCmd(evt);     break;
        case "typing":               handleTyping(evt);       break;
        case "typing_stop":          handleTypingStop(evt);   break;
        case "ping_rtt":             handleRtt(evt);          break;
        case "file_incoming":        handleFileIncoming(evt); break;
        case "file_progress":        handleFileProgress(evt); break;
        case "file_ready":           handleFileReady(evt);    break;
        case "file_send_progress":   handleSendProgress(evt); break;
        case "file_send_done":       handleSendDone(evt);     break;
        case "video_frame":          pipShowFrame(evt.data, evt.label); break;
        case "video_stop":           pipClose(); stopStreaming(); toast("peer stopped stream","info"); break;
        case "video_sender_active":
          if (!_streamActive) {
            _streamActive = true;
            document.getElementById("stream-label").textContent = evt.label || "streaming";
            document.getElementById("stream-indicator").classList.add("visible");
            document.getElementById("stream-stop-sidebar").style.display = "";
          }
          break;
        case "video_sender_stopped":
          _streamActive = false;
          document.getElementById("stream-indicator").classList.remove("visible");
          document.getElementById("stream-stop-sidebar").style.display = "none";
          break;
        case "error": toast(evt.message, "error"); break;
        default: console.warn("[nexus] unknown event:", evt.type);
      }
    } catch(e) { console.error("[nexus] onEvent threw:", e); }
  }
};

// ── Status ────────────────────────────────────────────────────────────────────
function handleStatus(evt) {
  const raw = (evt.state || "").toLowerCase().replace(/\s+.*$/, "");
  document.getElementById("status-dot").className    = raw;
  document.getElementById("status-text").textContent = evt.message || raw;
  document.getElementById("sb-state").textContent    = raw;
}

// ── Messages ──────────────────────────────────────────────────────────────────
function handleMessage(evt) {
  appendMessage({ sender: evt.from || "?", text: evt.text, ts: evt.ts, self: evt.self });
}

function handleImageMessage(evt) {
  const box = document.getElementById("messages");
  const row = document.createElement("div");
  row.className = "msg-row";
  const d = new Date((evt.ts || Date.now()/1000) * 1000);
  const t = d.toLocaleTimeString("en", {hour:"2-digit",minute:"2-digit",hour12:false});
  const body = document.createElement("div");
  body.className = "msg-body";
  const sender = document.createElement("span");
  sender.className = "msg-sender" + (evt.self ? " self" : "");
  sender.textContent = evt.from || "?";
  const img = document.createElement("img");
  img.className = "msg-img";
  img.src = "data:" + (evt.mime || "image/png") + ";base64," + evt.data;
  img.style.display = "block";
  img.style.marginTop = "4px";
  img.onclick = () => window.open(img.src, "_blank");
  body.appendChild(sender);
  body.appendChild(img);
  const ts = document.createElement("span");
  ts.className = "msg-ts";
  ts.textContent = t;
  row.appendChild(body);
  row.appendChild(ts);
  box.appendChild(row);
  box.scrollTop = box.scrollHeight;
}

function appendMessage({ sender, text, ts, self, system }) {
  const box = document.getElementById("messages");
  const row = document.createElement("div");
  row.className = "msg-row" + (system ? " system" : "");
  const d = ts ? new Date(ts * 1000) : new Date();
  const t = d.toLocaleTimeString("en", {hour:"2-digit",minute:"2-digit",hour12:false});
  row.innerHTML = `
    <div class="msg-body">
      <div class="msg-sender ${self ? "self" : ""}">${esc(sender)}</div>
      <div class="msg-text">${escNl(text)}</div>
    </div>
    <span class="msg-ts">${t}</span>`;
  box.appendChild(row);
  box.scrollTop = box.scrollHeight;
}

function eventLog(text, type = "") {
  const log = document.getElementById("event-log");
  if (!log) return;
  const line = document.createElement("div");
  line.className = "evt-line" + (type ? " " + type : "");
  const t = new Date().toLocaleTimeString("en", {hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false});
  line.textContent = t + "  " + text;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
  while (log.children.length > 60) log.removeChild(log.firstChild);
}

// ── Typing indicator ──────────────────────────────────────────────────────────
let _typingPeers = {};
let _typingTimeout = null;
let _myTypingTimer = null;
let _amTyping = false;

function handleTyping(evt) {
  _typingPeers[evt.from] = true;
  _renderTyping();
}

function handleTypingStop(evt) {
  delete _typingPeers[evt.from];
  _renderTyping();
}

function _renderTyping() {
  const el = document.getElementById("typing-indicator");
  const names = Object.keys(_typingPeers);
  el.textContent = names.length ? names.join(", ") + " is typing…" : "";
}

// ── Scratchpad ────────────────────────────────────────────────────────────────
function handleHistorySync(evt) {
  // Client receives history from host — render it before the session separator
  const messages = evt.messages || [];
  if (!messages.length) return;
  const box = document.getElementById("messages");
  const sep = document.createElement("div");
  sep.className = "msg-row system";
  sep.innerHTML = `<div class="msg-body"><span class="msg-text">── previous messages ──</span></div>`;
  box.insertBefore(sep, box.firstChild);
  // Insert in chronological order before the separator
  [...messages].reverse().forEach(m => {
    const row = document.createElement("div");
    row.className = "msg-row";
    const d = m.ts ? new Date(m.ts * 1000) : new Date();
    const t = d.toLocaleTimeString("en", {hour:"2-digit",minute:"2-digit",hour12:false});
    row.innerHTML = `
      <div class="msg-body">
        <div class="msg-sender ${m.self ? "self" : ""}">${esc(m.from)}</div>
        <div class="msg-text">${m.image ? "[image]" : escNl(m.text)}</div>
      </div>
      <span class="msg-ts">${t}</span>`;
    box.insertBefore(row, sep);
  });
}

// ── RTT / ping ────────────────────────────────────────────────────────────────
function handleRtt(evt) {
  const rtt  = evt.rtt_ms;
  const el   = document.getElementById("sb-rtt");
  const val  = document.getElementById("sb-rtt-val");
  el.classList.add("visible");
  val.textContent = rtt.toFixed(0);
  val.style.color = rtt < 50 ? "var(--green)" : rtt < 150 ? "var(--amber)" : "var(--red)";
}

// ── File transfer ─────────────────────────────────────────────────────────────
function handleFileIncoming(evt) {
  const row = document.createElement("div");
  row.className = "msg-row";
  const size = _fmtSize(evt.size);
  row.innerHTML = `
    <div class="msg-body">
      <span class="msg-sender">📦 Incoming file</span>
      <div class="file-msg" id="ft-${evt.id}">
        <div class="file-icon">📎</div>
        <div class="file-info">
          <div class="file-name">${esc(evt.name)}</div>
          <div class="file-size">${size}</div>
          <div class="file-progress"><div class="file-progress-bar" id="fp-${evt.id}" style="width:0%"></div></div>
        </div>
      </div>
    </div>`;
  document.getElementById("messages").appendChild(row);
  document.getElementById("messages").scrollTop = 9999;
}

function handleFileProgress(evt) {
  const bar = document.getElementById("fp-" + evt.id);
  if (bar) bar.style.width = evt.progress + "%";
}

function handleFileReady(evt) {
  const box = document.getElementById("ft-" + evt.id);
  if (!box) return;
  const info = box.querySelector(".file-info");
  const saveBtn = document.createElement("button");
  saveBtn.className = "btn green file-save-btn";
  saveBtn.textContent = "Save";
  saveBtn.onclick = () => saveIncomingFile(evt.id, evt.name, saveBtn);
  box.appendChild(saveBtn);
}

async function saveIncomingFile(id, name, btn) {
  btn.textContent = "Saving…";
  btn.disabled = true;
  const path = await pywebview.api.get_download_path(name);
  const r = await pywebview.api.save_file(id, path);
  if (r.ok) {
    btn.textContent = "Saved ✓";
    toast("saved to ~/Downloads/" + name, "success");
  } else {
    btn.textContent = "Error";
    btn.disabled = false;
    toast("save failed: " + r.error, "error");
  }
}

function handleSendProgress(evt) {
  // Could show a send progress indicator; for now just log
  eventLog("sending " + evt.name + " " + evt.progress + "%");
}

function handleSendDone(evt) {
  toast("sent " + evt.name, "success");
  eventLog("file sent: " + evt.name, "success");
  appendMessage({ sender: "You", text: "📎 Sent file: " + evt.name, ts: Date.now()/1000, self: true });
}

function _fmtSize(bytes) {
  if (!bytes) return "";
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + " KB";
  return (bytes/1024/1024).toFixed(1) + " MB";
}

// ── Peers ─────────────────────────────────────────────────────────────────────
function handlePeerJoin(evt) {
  const id   = evt.peer_id;
  const name = evt.name || id;
  const isNew = !state.peers[id];
  state.peers[id] = { name };
  renderPeers();
  if (isNew) {
    eventLog(name + " connected", "success");
    toast(name + " connected", "success");
    const dot = document.getElementById("voice-dot");
    const txt = document.getElementById("voice-status-text");
    if (!state.inCall) {
      dot.style.background = "var(--amber)";
      txt.textContent = "connecting…"; txt.style.color = "var(--amber)";
    }
  }
}

function handlePeerLeave(evt) {
  const id = evt.peer_id;
  const p  = state.peers[id];
  if (p) { eventLog(p.name + " disconnected", "warn"); toast(p.name + " disconnected", "error"); }
  delete state.peers[id];
  delete state.peerMuted[id];
  _typingPeers = {};
  _renderTyping();
  renderPeers();
  stopStreaming(); pipClose();
  document.getElementById("sb-rtt").classList.remove("visible");
  const dot = document.getElementById("voice-dot");
  const txt = document.getElementById("voice-status-text");
  dot.style.background = "var(--fg2)"; dot.style.boxShadow = "";
  txt.textContent = "waiting for peer…"; txt.style.color = "var(--fg2)";
}

function renderPeers() {
  const ids  = Object.keys(state.peers);
  const name = ids.length > 0 ? state.peers[ids[0]].name : "—";
  const sb = document.getElementById("sb-peers");
  if (sb) sb.textContent = name;
  renderAdminPanel();
}

function renderAdminPanel() {
  if (!state.isHost) return;
  const panel = document.getElementById("admin-panel");
  const noPeers = document.getElementById("admin-no-peers");
  const ids = Object.keys(state.peers);
  if (ids.length === 0) {
    noPeers.style.display = "";
    panel.querySelectorAll(".admin-row").forEach(el => el.remove());
    return;
  }
  noPeers.style.display = "none";
  panel.querySelectorAll(".admin-row").forEach(el => el.remove());
  ids.forEach(pid => {
    const p     = state.peers[pid];
    const muted = !!state.peerMuted[pid];
    const row   = document.createElement("div");
    row.className = "admin-row"; row.dataset.peer = pid;
    row.innerHTML = `
      <span class="admin-peer-name">${esc(p.name)}</span>
      <div class="admin-btns">
        ${muted
          ? `<button class="btn green" onclick="admin.unmute('${esc(pid)}')">Unmute</button>`
          : `<button class="btn danger" onclick="admin.mute('${esc(pid)}')">Mute</button>`}
        <button class="btn" onclick="admin.camera('${esc(pid)}')"> Cam</button>
      </div>`;
    panel.appendChild(row);
  });
}

// ── Call ──────────────────────────────────────────────────────────────────────
function handleCallStart(evt) {
  state.inCall = true;
  const dot = document.getElementById("voice-dot");
  const txt = document.getElementById("voice-status-text");
  dot.style.background = "var(--green)"; dot.style.boxShadow = "0 0 6px var(--green)";
  txt.textContent = "connected"; txt.style.color = "var(--green)";
  document.getElementById("call-extra-btns").classList.add("visible");
  document.getElementById("mic-meter").classList.add("active");
  document.getElementById("in-call-banner").classList.add("visible");
  eventLog("voice call started", "success");
  toast("call connected", "success");
}

function handleCallEnd() {
  state.inCall = state.muted = state.deafened = false;
  const dot = document.getElementById("voice-dot");
  const txt = document.getElementById("voice-status-text");
  dot.style.background = "var(--fg2)"; dot.style.boxShadow = "";
  txt.textContent = "disconnected"; txt.style.color = "var(--fg2)";
  document.getElementById("call-extra-btns").classList.remove("visible");
  document.getElementById("mic-meter").classList.remove("active");
  document.getElementById("in-call-banner").classList.remove("visible");
  document.getElementById("mic-bar").style.width = "0%";
  document.getElementById("mute-btn").classList.remove("active");
  document.getElementById("deaf-btn").classList.remove("active");
  eventLog("call ended", "warn");
}

function handleMicLevel(evt) {
  document.getElementById("mic-bar").style.width = (evt.level * 100).toFixed(1) + "%";
}

function handleAdminCmd(evt) {
  const cmd = evt.cmd;
  if (cmd === "mute") {
    state.muted = true;
    if (state.inCall) { document.getElementById("mute-btn").classList.add("active"); }
    toast("you were muted by host", "info");
  } else if (cmd === "unmute") {
    state.muted = false;
    if (state.inCall) { document.getElementById("mute-btn").classList.remove("active"); }
    toast("you were unmuted", "info");
  } else if (cmd === "camera_on") {
    toast("host requested your camera", "info");
    actions.openCamera();
  }
}

// ── Actions ───────────────────────────────────────────────────────────────────
const actions = {
  async toggleMute() {
    state.muted = !state.muted;
    await pywebview.api.set_muted(state.muted);
    const btn = document.getElementById("mute-btn");
    btn.classList.toggle("active", state.muted);
    btn.innerHTML = state.muted ? "🔇 Muted" : "🎙 Mic";
  },
  async toggleDeaf() {
    state.deafened = !state.deafened;
    await pywebview.api.set_deafened(state.deafened);
    const btn = document.getElementById("deaf-btn");
    btn.classList.toggle("active", state.deafened);
    btn.innerHTML = state.deafened ? "🔕 Deaf" : "🎧 Audio";
  },
  async send() {
    const ta  = document.getElementById("msg-input");
    const txt = ta.value.trim();
    if (!txt) return;
    _stopTyping();
    const r = await pywebview.api.send_message(txt);
    if (r.ok) { ta.value = ""; ta.style.height = "34px"; ta.style.overflowY = "hidden"; }
    else toast(r.error || "send failed", "error");
  },
  inputKeydown(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); actions.send(); return; }
    const ta = e.target;
    requestAnimationFrame(() => {
      ta.style.height = "34px";
      const h = Math.min(ta.scrollHeight, 120);
      ta.style.height = h + "px";
      ta.style.overflowY = ta.scrollHeight > 120 ? "auto" : "hidden";
    });
  },
  onTyping() {
    if (!_amTyping) {
      _amTyping = true;
      pywebview.api.send_typing(true);
    }
    clearTimeout(_myTypingTimer);
    _myTypingTimer = setTimeout(_stopTyping, 2000);
  },
  async handlePaste(e) {
    const items = (e.clipboardData || e.originalEvent?.clipboardData)?.items;
    if (!items) return;
    for (const item of items) {
      if (item.kind === "file" && item.type.startsWith("image/")) {
        e.preventDefault();
        const file = item.getAsFile();
        const reader = new FileReader();
        reader.onload = async (ev) => {
          const dataUrl = ev.target.result;
          const b64 = dataUrl.split(",")[1];
          const mime = item.type;
          if (Object.keys(state.peers).length === 0) { toast("no peer connected","error"); return; }
          const r = await pywebview.api.send_image(b64, mime);
          if (!r.ok) toast("image send failed: " + r.error, "error");
        };
        reader.readAsDataURL(file);
        return;
      }
    }
  },
  async sendFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (Object.keys(state.peers).length === 0) { toast("no peer connected","error"); return; }
    if (file.size > 50 * 1024 * 1024) { toast("file too large (max 50 MB)","error"); return; }
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const b64 = ev.target.result.split(",")[1];
      toast("sending " + file.name + "…", "info");
      appendMessage({ sender: "You", text: "📎 Sending: " + file.name, ts: Date.now()/1000, self: true });
      await pywebview.api.send_file(file.name, b64, file.type);
    };
    reader.readAsDataURL(file);
    e.target.value = "";
  },
  async openCamera() {
    if (Object.keys(state.peers).length === 0) { toast("no peer connected","error"); return; }
    const r = await pywebview.api.start_camera_stream();
    if (!r.ok) toast("camera: " + r.error, "error");
    else { eventLog("camera stream started","info"); toast("camera streaming","info"); }
  },
  async shareScreen() {
    if (Object.keys(state.peers).length === 0) { toast("no peer connected","error"); return; }
    const r = await pywebview.api.start_screen_stream();
    if (!r.ok) toast("screen: " + r.error, "error");
    else { eventLog("screen stream started","info"); toast("screen streaming","info"); }
  },
  stopStream() { pywebview.api.stop_video_stream(); },
};

function _stopTyping() {
  if (_amTyping) {
    _amTyping = false;
    pywebview.api.send_typing(false);
  }
  clearTimeout(_myTypingTimer);
}

// ── Admin ─────────────────────────────────────────────────────────────────────
const admin = {
  async mute(peerId) {
    const r = await pywebview.api.admin_mute_peer(peerId);
    if (r.ok) { state.peerMuted[peerId] = true; renderAdminPanel(); toast("muted peer","info"); }
    else toast(r.error,"error");
  },
  async unmute(peerId) {
    const r = await pywebview.api.admin_unmute_peer(peerId);
    if (r.ok) { state.peerMuted[peerId] = false; renderAdminPanel(); toast("unmuted peer","info"); }
    else toast(r.error,"error");
  },
  async camera(peerId) {
    const r = await pywebview.api.admin_request_camera(peerId);
    if (r.ok) toast("camera request sent","info"); else toast(r.error,"error");
  },
};

// ── Settings UI ───────────────────────────────────────────────────────────────
const ui = {
  async openSettings() {
    try {
      const ps = await navigator.mediaDevices.getUserMedia({audio:true,video:true})
        .catch(() => navigator.mediaDevices.getUserMedia({audio:true}).catch(() => null));
      if (ps) ps.getTracks().forEach(t => t.stop());
    } catch(e) {}
    try {
      const devs = await navigator.mediaDevices.enumerateDevices();
      const savedMic = localStorage.getItem("dusk-mic") || "";
      const savedCam = localStorage.getItem("dusk-cam") || "";
      const micOpts = [{ value: "", label: "Default" }];
      const camOpts = [{ value: "", label: "Default" }];
      let micIdx = 1, camIdx = 1;
      devs.forEach(d => {
        if (d.kind === "audioinput")
          micOpts.push({ value: d.deviceId, label: d.label || `Microphone ${micIdx++}` });
        if (d.kind === "videoinput")
          camOpts.push({ value: d.deviceId, label: d.label || `Camera ${camIdx++}` });
      });
      duskSelectBuild("dusk-mic-select", "dusk-mic-list", micOpts, savedMic);
      duskSelectBuild("dusk-cam-select", "dusk-cam-list", camOpts, savedCam);
    } catch(e) {}
    document.getElementById("setting-name").value = state.displayName || "";
    buildThemeGrid();
    document.getElementById("settings-modal").classList.add("visible");
  },
  closeSettings() {
    document.getElementById("settings-modal").classList.remove("visible");
  },
  async saveSettings() {
    const name = document.getElementById("setting-name").value.trim();
    if (name) {
      await pywebview.api.set_name(name);
      state.displayName = name;
    }
    localStorage.setItem("dusk-mic", document.getElementById("dusk-mic-select").dataset.value || "");
    localStorage.setItem("dusk-cam", document.getElementById("dusk-cam-select").dataset.value || "");
    ui.closeSettings();
    toast("settings saved","success");
  },
  async clearHistory() {
    if (!confirm("Clear all message history?")) return;
    const r = await pywebview.api.clear_history();
    if (r.ok) { toast("history cleared","success"); document.getElementById("messages").innerHTML = ""; }
    else toast("failed: " + r.error,"error");
  },
};

// ── PiP ───────────────────────────────────────────────────────────────────────
let _streamActive = false;

function stopStreaming() {
  if (!_streamActive) return;
  _streamActive = false;
  document.getElementById("stream-indicator").classList.remove("visible");
  document.getElementById("stream-stop-sidebar").style.display = "none";
  try { pywebview.api.stop_video_stream(); } catch(e) {}
}

function pipShowFrame(b64jpeg, label) {
  const overlay = document.getElementById("pip-overlay");
  if (!overlay.classList.contains("visible")) {
    overlay.classList.add("visible");
    if (!overlay._draggable) { overlay._draggable = true; makeDraggable(overlay); }
  }
  document.getElementById("pip-label").textContent = label || "peer stream";
  let imgEl = document.getElementById("pip-img-display");
  if (!imgEl) {
    imgEl = document.createElement("img");
    imgEl.id = "pip-img-display";
    imgEl.style.cssText = "flex:1;width:100%;display:block;object-fit:cover;background:#000;min-height:0;";
    document.getElementById("pip-video").replaceWith(imgEl);
  }
  imgEl.src = "data:image/jpeg;base64," + b64jpeg;
}

function pipClose() {
  document.getElementById("pip-overlay").classList.remove("visible");
}

function makeDraggable(el) {
  // Drag only from the title bar, not from the image (so resize corner stays usable)
  const bar = document.getElementById("pip-bar");
  let dragging = false, sx=0, sy=0, ox=0, oy=0;

  bar.addEventListener("mousedown", e => {
    if (e.target.id === "pip-close") return;
    e.preventDefault();
    dragging = true;
    // Use getBoundingClientRect so it works whether el is newly visible or not
    const rect = el.getBoundingClientRect();
    ox = rect.left; oy = rect.top;
    sx = e.clientX;  sy = e.clientY;
    // Switch from bottom/right anchoring to top/left so movement is predictable
    el.style.left   = ox + "px";
    el.style.top    = oy + "px";
    el.style.bottom = "auto";
    el.style.right  = "auto";
  });

  document.addEventListener("mousemove", e => {
    if (!dragging) return;
    el.style.left = (ox + e.clientX - sx) + "px";
    el.style.top  = (oy + e.clientY - sy) + "px";
  });

  document.addEventListener("mouseup", () => { dragging = false; });
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, type="") {
  const el = document.createElement("div");
  el.className = "toast " + type; el.textContent = msg;
  document.getElementById("toast-area").appendChild(el);
  setTimeout(() => el.remove(), 3100);
}

// ── Escape ────────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function escNl(str) {
  return esc(str).replace(/\n/g, "<br>");
}

// ── Custom dropdown ───────────────────────────────────────────────────────────

function duskSelectToggle(id) {
  const el = document.getElementById(id);
  const isOpen = el.classList.contains("open");
  // Close all open dropdowns first
  document.querySelectorAll(".dusk-select.open").forEach(d => d.classList.remove("open"));
  if (!isOpen) el.classList.add("open");
}

function duskSelectBuild(selectId, listId, opts, selectedValue) {
  const sel  = document.getElementById(selectId);
  const list = document.getElementById(listId);
  const val  = sel.querySelector(".dusk-select-val");
  sel.dataset.value = selectedValue;
  list.innerHTML = "";
  opts.forEach(opt => {
    const div = document.createElement("div");
    div.className = "dusk-select-opt" + (opt.value === selectedValue ? " selected" : "");
    div.textContent = opt.label;
    div.onclick = () => {
      sel.dataset.value = opt.value;
      val.textContent   = opt.label;
      list.querySelectorAll(".dusk-select-opt").forEach(o => o.classList.remove("selected"));
      div.classList.add("selected");
      sel.classList.remove("open");
    };
    list.appendChild(div);
  });
  // Set displayed label
  const match = opts.find(o => o.value === selectedValue);
  val.textContent = match ? match.label : (opts[0]?.label || "Default");
}

// Close dropdown when clicking outside
document.addEventListener("click", e => {
  if (!e.target.closest(".dusk-select")) {
    document.querySelectorAll(".dusk-select.open").forEach(d => d.classList.remove("open"));
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  console.log("[nexus] init()");
  try {
    if (typeof pywebview === "undefined" || !pywebview.api) {
      console.error("[nexus] pywebview.api not available"); return;
    }
    const id = await pywebview.api.get_identity();
    state.isHost = id.is_host;
    state.displayName = id.name;
    applyTheme(state.theme);
    document.getElementById("sb-port").textContent = id.port;
    eventLog("Dusk ready — " + (id.is_host ? "hosting on port " + id.port : "connecting…"), "info");
    document.getElementById("event-log-section").classList.add("visible");
    if (id.is_host) {
      document.getElementById("admin-section").classList.add("visible");
    }

    // Host loads local history; client receives it via history_sync
    if (id.is_host) {
      const history = await pywebview.api.get_history(100);
      if (history.length) {
        const box = document.getElementById("messages");
        const sep = document.createElement("div");
        sep.className = "msg-row system";
        sep.innerHTML = `<div class="msg-body"><span class="msg-text">── previous messages ──</span></div>`;
        box.appendChild(sep);
        history.forEach(m => appendMessage({
          sender: m.from, text: m.image ? "[image]" : m.text,
          ts: m.ts, self: m.self
        }));
        box.scrollTop = box.scrollHeight;
      }
    }

  } catch(e) { console.error("[nexus] init error:", e); }
}

let _initDone = false;
function _runInit() {
  if (_initDone) return;
  _initDone = true;
  init();
}

window.addEventListener("pywebviewready", _runInit);
let _pollCount = 0;
const _poll = setInterval(() => {
  _pollCount++;
  if (typeof pywebview !== "undefined" && pywebview.api) {
    clearInterval(_poll); _runInit();
  }
  if (_pollCount > 60) clearInterval(_poll);
}, 100);

window.addEventListener("resize", () => {
  document.documentElement.style.opacity = "0.9999";
  requestAnimationFrame(() => { document.documentElement.style.opacity = ""; });
});
</script>
